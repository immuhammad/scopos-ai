# Render blueprint — deploy the Scopos backend with one click:
#   https://dashboard.render.com/blueprints → New Blueprint Instance → point at this repo.
# Fill the four secret keys when prompted. The seeded vcbrain.db is COMMITTED,
# so the service boots with the full demo dataset — no shell/seed step (the free
# plan has no shell anyway). No persistent disk: live writes reset to the
# committed snapshot on every redeploy/wake. The frontend lives on Vercel
# (README §Deploy); its origin must stay listed in CORS_ORIGINS below.
services:
  - type: web
    name: scopos-api
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: OPENAI_API_KEY
        sync: false
      - key: TAVILY_API_KEY
        sync: false
      - key: GITHUB_TOKEN
        sync: false
      - key: ELEVENLABS_API_KEY
        sync: false
      - key: DATABASE_URL
        value: sqlite:///./vcbrain.db
      - key: CORS_ORIGINS
        value: https://venture-mind-os.lovable.app,https://scopos-ai.vercel.app,http://localhost:8080,http://localhost:5173
